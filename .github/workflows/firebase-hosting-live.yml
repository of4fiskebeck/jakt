name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Show project files
        run: |
          echo "Current folder:"
          pwd
          echo "Files:"
          ls -la
          echo "package.json:"
          cat package.json

      - name: Clean old npm lock and cache
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm cache clean --force

      - name: Install dependencies
        run: npm install --no-audit --no-fund --package-lock=false

      - name: Build app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Create Firebase service account file
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-service-account.json
          echo "Service account file created"
          ls -la /tmp/firebase-service-account.json

      - name: Check Firebase config files
        run: |
          echo "firebase.json:"
          cat firebase.json
          echo "firestore.rules:"
          cat firestore.rules
          echo "storage.rules:"
          cat storage.rules

      - name: Deploy to Firebase Hosting and rules
        run: |
          npx --yes firebase-tools@latest deploy \
            --only hosting,firestore:rules,storage \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}"
